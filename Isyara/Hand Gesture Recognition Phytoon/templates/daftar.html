<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISYARA - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, #e0f7f9 0%, #b2ebf2 50%, #e0f2f1 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .container {
    background: white;
    border-radius: 28px;
    padding: 48px 40px;
    width: 420px;
    box-shadow: 0 24px 60px rgba(31,163,184,0.15);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 28px; font-weight: 900;
    color: #1FA3B8; margin-bottom: 8px;
    justify-content: center;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #1FA3B8, #6da0af);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .subtitle { text-align: center; color: #718096; font-size: 14px; margin-bottom: 32px; }
  .tabs { display: flex; gap: 0; margin-bottom: 28px; background: #f0f4f8; border-radius: 12px; padding: 4px; }
  .tab {
    flex: 1; padding: 10px; border: none; background: none;
    border-radius: 10px; font-size: 14px; font-weight: 700;
    cursor: pointer; color: #718096; transition: all 0.2s;
  }
  .tab.active { background: white; color: #1FA3B8; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 700; color: #1E6773; margin-bottom: 8px; }
  input {
    width: 100%; padding: 12px 16px;
    border: 2px solid #e2e8f0; border-radius: 10px;
    font-size: 15px; font-family: inherit;
    transition: border-color 0.2s; outline: none;
  }
  input:focus { border-color: #1FA3B8; }
  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #1FA3B8, #6da0af);
    color: white; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    font-family: inherit; margin-top: 8px;
    transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(31,163,184,0.35); }
  .error {
    background: #fff5f5; border: 1px solid #fc8181;
    color: #c53030; padding: 12px 16px; border-radius: 10px;
    font-size: 13px; margin-bottom: 16px; text-align: center;
  }
  .form-section { display: none; }
  .form-section.active { display: block; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
      <img src="{{ url_for('static', filename='images/lidm.bg.png') }}" alt="Logo" style="height:40px; width:auto; border-radius:8px;">
    ISYARA
  </div>
  <p class="subtitle">Platform Pembelajaran Bahasa Isyarat Berbasis AI</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Masuk</button>
    <button class="tab active" onclick="switchTab('daftar')">Daftar</button>
  </div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <!-- REGISTER -->
  <div class="form-section" id="registerForm">
    <form method="POST">
      <input type="hidden" name="action" value="register">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Buat username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min. 6 karakter" required>
      </div>
        <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min. 6 karakter" required>
      </div>
        <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min. 6 karakter" required>
      </div>
      <button type="submit" class="btn"> Daftar Sekarang</button>
    </form>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
    document.getElementById(tab + 'Form').classList.add('active');
    event.target.classList.add('active');
  }
</script>
</body>
</html>
